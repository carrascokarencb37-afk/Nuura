<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuura - Calendario de Riego</title>
    <link rel="stylesheet" href="../css/cale.css">
    <script src="../js/calen.js" defer></script>
    <script src="../js/calen_notif.js" defer></script>
</head>
<body>
    <div class="container">
        <!-- Selector de flor -->
        <div class="selector-flor">
            <label>🌿 Selecciona tu planta 🌿</label>
            <div>
                <select id="flor">
                    <option value="rosa">🌹 Rosa (cada 5 días)</option>
                    <option value="jazmin">🌼 Jazmín (cada 1 días)</option>
                    <option value="corona">👑 Corona de Cristo (cada 3 días)</option>
                    <option value="duranta">💜 Duranta (cada 2 días)</option>
                    <option value="pervinca">🌸 Pervinca (cada 1 día)</option>
                    <option value="capuchina">🧡 Capuchina (cada 1 día)</option>
                    <option value="ruda">🌿 Ruda (cada 2 días)</option>
                    <option value="pascua">❤️ Flor de Pascua (cada 1 días)</option>
                    <option value="bigotillo">💚 Bigotillo (cada 2 días)</option>
                    <option value="trompillo">💛 Trompillo (cada 2 día)</option>
                </select>
                <button onclick="calcularRiego()">Ver próximos riegos 💧</button>
            </div>
        </div>

        <!-- Resultado de riegos -->
        <div class="resultado-riegos">
            <h3>📅 Próximos riegos</h3>
            <div id="resultado">
                <p style="color: gray;">Selecciona una planta y haz clic en "Ver próximos riegos"</p>
                <div id="recordatorio"></div>
            </div>
        </div>

        <!-- Calendar Container -->
        <div class="calendar">
            <!-- Month and Year Header -->
            <div class="calendar-header">
                <button onclick="mesAnterior()">◀</button>
                <span id="monthYear"></span>
                <button onclick="mesSiguiente()">▶</button>
            </div>

            <!-- Days of the Week -->
            <div class="calendar-days">
                <div>Dom</div>
                <div>Lun</div>
                <div>Mar</div>
                <div>Mié</div>
                <div>Jue</div>
                <div>Vie</div>
                <div>Sáb</div>
            </div>

            <!-- Calendar Dates -->
            <div id="calendarDates" class="calendar-dates"></div>
        </div>
    </div>
</body>
</html>
